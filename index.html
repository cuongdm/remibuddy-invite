<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RemiBuddy Invite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #1d1d1f; color: #f5f5f7; }
            .card { background: #2d2d2f; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
            .code { background: #3d3d3f; color: #0a84ff; }
            .btn { background: #0a84ff; }
            .btn:hover { background: #0077ed; }
            .btn-secondary { background: #3d3d3f; color: #f5f5f7; }
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        .icon { font-size: 60px; margin-bottom: 20px; }
        h1 { font-size: 28px; margin-bottom: 10px; font-weight: 600; }
        p { font-size: 16px; color: #6e6e73; margin-bottom: 20px; line-height: 1.5; }
        .code {
            font-size: 32px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            background: #f0f0f5;
            color: #007aff;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            letter-spacing: 4px;
        }
        .btn {
            display: inline-block;
            background: #007aff;
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            margin: 10px 5px;
            transition: background 0.2s;
        }
        .btn:hover { background: #0051d5; }
        .btn-secondary {
            background: #e5e5ea;
            color: #1d1d1f;
        }
        .btn-secondary:hover { background: #d1d1d6; }
        .divider {
            border-top: 1px solid #d1d1d6;
            margin: 30px 0;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔔</div>
        <div id="loading">
            <h1>Opening RemiBuddy...</h1>
            <p>Please wait while we redirect you to the app.</p>
        </div>
        <div id="fallback" class="hidden">
            <h1>Join RemiBuddy!</h1>
            <p>You've been invited to become buddies on RemiBuddy.</p>
            <div class="code" id="codeDisplay">------</div>
            <p>Use this code in the RemiBuddy app to connect.</p>
            <a href="#" id="openAppBtn" class="btn">Open RemiBuddy</a>
            <div class="divider"></div>
            <p style="font-size: 14px; color: #86868b;">Don't have RemiBuddy yet?</p>
            <a href="https://apps.apple.com/app/remibuddy/idXXXXXXXXX" class="btn btn-secondary">Download on App Store</a>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code') || '------';
        const deepLink = `remibuddy://invite?code=${code}`;

        document.getElementById('codeDisplay').textContent = code;
        document.getElementById('openAppBtn').href = deepLink;

        // Attempt immediate redirect
        window.location.href = deepLink;

        // Show fallback after 2 seconds if still on page
        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('fallback').classList.remove('hidden');
        }, 2000);
    </script>
</body>
</html>
